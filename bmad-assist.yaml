# bmad-assist configuration for APP-MAIN

project_name: APP-MAIN
user_name: Christian
communication_language: English
document_output_language: English
user_skill_level: expert

paths:
  project_knowledge: "{project-root}/_bmad-output/planning-artifacts"
  output_folder: "{project-root}/_bmad-output"
  planning_artifacts: "{project-root}/_bmad-output/planning-artifacts"
  implementation_artifacts: "{project-root}/_bmad-output/implementation-artifacts"

timeouts:
  default: 600
  retries: 2
  create_story: 900
  validate_story: 900
  validate_story_synthesis: 600
  dev_story: 3600
  code_review: 1200
  code_review_synthesis: 900
  retrospective: 900
  atdd: 900
  test_review: 600
  tea_test_design: 900
  tea_framework: 600
  tea_ci: 600
  tea_nfr_assess: 900
  trace: 900
  qa_plan_generate: 1200
  qa_plan_execute: 3600
  qa_remediate: 3600

providers:
  master:
    provider: claude
    model: opus

  helper:
    provider: claude
    model: haiku

  multi:
    - provider: gemini
      model: gemini-2.5-flash
    - provider: codex
      model: gpt-5.4
    - provider: kimi
      model: kimi-code/kimi-for-coding
    - provider: opencode
      model: zai-coding-plan/glm-4.7

phase_models:
  create_story:
    provider: claude
    model: opus
  validate_story_synthesis:
    provider: claude
    model: sonnet
  dev_story:
    provider: claude
    model: opus
  code_review_synthesis:
    provider: claude
    model: sonnet
  retrospective:
    provider: claude
    model: sonnet
  atdd:
    provider: claude
    model: sonnet
  test_review:
    provider: claude
    model: sonnet
  qa_plan_generate:
    provider: claude
    model: sonnet
  qa_plan_execute:
    provider: claude
    model: sonnet

  validate_story:
    - provider: gemini
      model: gemini-2.5-flash
    - provider: opencode
      model: zai-coding-plan/glm-4.7
  code_review:
    - provider: gemini
      model: gemini-2.5-flash
    - provider: codex
      model: gpt-5.4
    - provider: kimi
      model: kimi-code/kimi-for-coding
      thinking: true
    - provider: opencode
      model: zai-coding-plan/glm-4.7

compiler:
  source_context:
    budgets:
      create_story: 20000
      validate_story: 15000
      validate_story_synthesis: 0
      dev_story: 15000
      code_review: 15000
      code_review_synthesis: 0
      default: 20000

    scoring:
      in_file_list: 50
      in_git_diff: 50
      is_test_file: -10
      is_config_file: -5
      change_lines_factor: 1
      change_lines_cap: 50

    extraction:
      adaptive_threshold: 0.25
      hunk_context_lines: 20
      hunk_context_scale: 0.3
      max_files: 15

  strategic_context:
    budget: 15000
    tree_budget: 0
    defaults:
      include: [project-context]
      main_only: true
    create_story:
      include: [project-context, prd, architecture, ux]
    validate_story:
      include: [project-context, architecture]
    validate_story_synthesis:
      include: [project-context]
    dev_story:
      include: [project-context, architecture]
    code_review:
      include: [project-context, architecture]
    code_review_synthesis:
      include: [project-context]
    retrospective:
      include: [project-context]

benchmarking:
  enabled: false

parallel_delay: 2.0

loop:
  epic_setup:
    - tea_framework
    - tea_ci
    - tea_test_design
  story:
    - create_story
    - validate_story
    - validate_story_synthesis
    - atdd
    - dev_story
    - code_review
    - code_review_synthesis
    - test_review
  epic_teardown:
    - trace
    - tea_nfr_assess
    - retrospective
  code_review_rework: true
  max_rework_attempts: 2

testarch:
  enabled: true
  engagement_model: auto
  atdd_mode: auto
  framework_mode: auto
  ci_mode: auto
  test_design_mode: "off"
  test_design_level: auto
  automate_mode: "off"
  nfr_assess_mode: auto
  trace_on_epic_complete: auto
  test_review_on_code_complete: auto
  test_dir: e2e/

  playwright:
    browsers: [chromium]
    headless: true
    timeout: 30000
    workers: 1

  context:
    enabled: true
    budget: 10000
    max_tokens_per_artifact: 4000
    max_files_per_resolver: 10
    workflows:
      dev_story:
        include: [test-design, atdd]
      code_review:
        include: [test-design]
      code_review_synthesis:
        include: [test-review]
      retrospective:
        include: [trace]

tool_call_guard:
  enabled: true
  rapid_fire_window: 8
  rapid_fire_threshold: 25
  repeating_threshold: 6
  runaway_threshold: 200

deep_verify:
  enabled: false
  reject_threshold: 6.0
  uncertain_high: 6.0
  uncertain_low: -3.0
  accept_threshold: -3.0
  critical_weight: 4.0
  error_weight: 2.0
  warning_weight: 1.0
  info_weight: 0.5
  clean_pass_bonus: -0.5

  llm_config:
    max_retries: 3
    base_delay_seconds: 1.0
    max_delay_seconds: 30.0
    tokens_per_minute_limit: 100000
    cost_tracking_enabled: true
    log_all_calls: true
    default_timeout_seconds: 90
    total_timeout_seconds: 180

  resource_limits:
    max_artifact_size_bytes: 204800
    max_line_count: 5000
    max_findings_per_method: 50
    max_total_findings: 200
    regex_timeout_seconds: 5.0

  method_153_pattern_match:
    enabled: true
    timeout_seconds: 90
  method_154_boundary_analysis:
    enabled: true
    timeout_seconds: 90
  method_155_assumption_surfacing:
    enabled: true
    timeout_seconds: 90
  method_157_temporal_consistency:
    enabled: true
    timeout_seconds: 90
  method_201_adversarial_review:
    enabled: true
    timeout_seconds: 120
  method_203_domain_expert:
    enabled: true
    timeout_seconds: 120
  method_204_integration_analysis:
    enabled: true
    timeout_seconds: 90
  method_205_worst_case:
    enabled: true
    timeout_seconds: 90

security_agent:
  enabled: false
  max_findings: 20

notifications:
  enabled: false
  providers:
    - type: telegram
      bot_token: "${TELEGRAM_BOT_TOKEN}"
      chat_id: "${TELEGRAM_CHAT_ID}"
    - type: discord
      webhook_url: "${DISCORD_WEBHOOK_URL}"
  events:
    - story_started
    - story_completed
    - phase_completed
    - error_occurred
    - anomaly_detected

warnings:
  suppress_gitignore: true
