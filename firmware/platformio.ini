[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
test_framework = unity
test_build_src = true
monitor_speed = 115200

lib_deps =
    fastled/FastLED @ ^3.6.0
    adafruit/Adafruit GFX Library @ ^1.11.9
    marcmerlin/FastLED NeoMatrix @ ^1.2
    bblanchon/ArduinoJson @ ^7.4.2
    mathieucarbou/ESPAsyncWebServer @ ^3.6.0

board_build.filesystem = littlefs
board_build.partitions = custom_partitions.csv

extra_scripts = pre:check_size.py

lib_ldf_mode = deep+

build_src_filter =
    +<*.cpp>
    +<**/*.cpp>
    +<../adapters/*.cpp>
    +<../core/*.cpp>
    +<../utils/*.cpp>
    +<../modes/*.cpp>
    +<../widgets/*.cpp>

build_flags =
    -I .
    -I include
    -I src
    -I adapters
    -I core
    -I models
    -I interfaces
    -I utils
    -I config
    -I modes
    -I widgets
    -D LOG_LEVEL=3
    -D FW_VERSION=\"1.0.0\"
    -D GITHUB_REPO_OWNER=\"LuckierTrout\"
    -D GITHUB_REPO_NAME=\"TheFlightWall_OSS-main\"

[env:esp32s3_devkitc]
extends = env:esp32dev
board = esp32-s3-devkitc-1
build_flags =
    ${env:esp32dev.build_flags}
    -D ARDUINO_USB_CDC_ON_BOOT=1

# --- Layout Editor V0 Feasibility Spike (Story LE-0.1) ---
# Baseline build: current ClassicCardMode with tick() instrumentation enabled.
# Use for apples-to-apples comparison against the spike build.
#   pio run -e esp32dev_le_baseline -t upload
[env:esp32dev_le_baseline]
extends = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    -D LE_V0_METRICS

# Spike build: same instrumentation + registers CustomLayoutMode as 5th mode.
# Set active mode to "custom_layout" via dashboard or NVS after flashing to
# exercise the spike renderer.
#   pio run -e esp32dev_le_spike -t upload
[env:esp32dev_le_spike]
extends = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    -D LE_V0_METRICS
    -D LE_V0_SPIKE

# --- Lonely Binary ESP32-S3 N16R8 Gold Edition (primary target) ---
# 16MB QSPI flash + 8MB QSPI PSRAM. Verified via esptool 2026-04-20:
# chip rev v0.2, MAC 10:b4:1d:ce:3b:ec, flash QSPI @ 3.3V, PSRAM
# AP_3v3 (QSPI — NOT the octal variant despite "Gold Edition" branding).
# Use this env for all flashes to the N16R8 hardware:
#   pio run -e esp32s3_n16r8 -t upload
#   pio run -e esp32s3_n16r8 -t uploadfs
# First flash after switching partition tables requires a full erase:
#   pio run -e esp32s3_n16r8 -t erase
[env:esp32s3_n16r8]
extends = env:esp32dev
board = esp32-s3-devkitc-1
board_build.partitions = partitions_16mb.csv
board_build.flash_mode = qio
# PSRAM disabled 2026-04-20: with memory_type=qio_opi and BOARD_HAS_PSRAM,
# Wi-Fi init panics on first station connect with "Cache disabled but cached
# memory region accessed" — a known interaction between OPI PSRAM and the
# Wi-Fi driver on this module variant. The firmware does not use PSRAM, so
# the safe move is to skip PSRAM init entirely. Revisit if a feature
# actually needs the 8MB (logo cache in PSRAM, large layout buffers, etc).
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
upload_speed = 921600
build_flags =
    ${env:esp32dev.build_flags}
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D FW_EXPECTED_APP_SIZE=0x300000
    -D FW_EXPECTED_SPIFFS_SIZE=0x9E0000
